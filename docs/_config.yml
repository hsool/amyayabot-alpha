title: AmyayaBot Documentation
description: Beginner-friendly public docs for AmyayaBot — quick start, setup, settings, FAQ, and legacy reference links
remote_theme: just-the-docs/just-the-docs

url: https://hsool.github.io
baseurl: /amyayabot-alpha

search_enabled: true
search.heading_level: 3
color_scheme: dark

footer_content: "AmyayaBot &copy; 2026. AI 기반 치지직 스트리밍 컴패니언 봇."

aux_links:
  "GitHub":
    - "https://github.com/hsool/amyayabot-alpha"

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - .omc/
  - v1/node_modules/
  - v1/package-lock.json
  - v1/package.json
  - v1/capture-screenshots.cjs
  - v1/capture-screenshots.mjs
